<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like & Dislike Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
        }

        #container {
            width: 320px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            padding: 20px;
        }

        #image-container img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        #image-container h3 {
            margin: 15px 0;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }

        button {
            width: 60px;
            height: 40px;
            font-size: 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .like-btn {
            background: #28a745;
            color: white;
        }

        .like-btn:hover {
            background: #218838;
        }

        .dislike-btn {
            background: #dc3545;
            color: white;
        }

        .dislike-btn:hover {
            background: #c82333;
        }

        #like-count,
        #dislike-count {
            font-size: 22px;
        }
    </style>

</head>

<body>

    <div id="container">

        <div id="image-container">
            <img src="https://pbs.twimg.com/media/GqRnx1DXYAE7ZWO.jpg"
                alt="King Khan">

            <h3>King Khan</h3>

            <div class="btn">
                <button id="like-btn" class="like-btn">👍</button>
                <h3>Likes: <span id="like-count">0</span></h3>
            </div>

            <div class="btn">
                <button id="dislike-btn" class="dislike-btn">👎</button>
                <h3>Dislikes: <span id="dislike-count">0</span></h3>
            </div>

        </div>

    </div>

    <script>
        let likeBtn = document.getElementById("like-btn");
        let dislikeBtn = document.getElementById("dislike-btn");

        let likeCount = 0;
        let dislikeCount = 0;

        likeBtn.addEventListener("click", function () {
            likeCount++;
            document.getElementById("like-count").innerText = likeCount;
        });

        dislikeBtn.addEventListener("click", function () {
            dislikeCount++;
            document.getElementById("dislike-count").innerText = dislikeCount;
        });


    </script>

</body>

</html>
